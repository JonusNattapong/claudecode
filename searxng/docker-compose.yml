services:
  searxng:
    image: searxng/searxng:latest
    container_name: claude-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST:-127.0.0.1}:${SEARXNG_PORT:-18889}:8080"
    volumes:
      # Writable config dir — container generates default settings.yml on first run
      - ./config:/etc/searxng
      - ./limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-18889}/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:?need SEARXNG_SECRET_KEY}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
