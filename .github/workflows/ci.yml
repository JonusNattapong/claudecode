name: CI

on:
push:
branches:
- main
- master
- develop
pull_request:
branches:
- main
- master
- develop

concurrency:
group: ${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true

permissions:
contents: read

env:
BUN_VERSION: latest
NODE_VERSION: 22

jobs:
lockfile:
name: Lockfile Check
timeout-minutes: 5
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Verify lockfile
    run: bun ci
```

typecheck:
name: TypeScript
timeout-minutes: 10
runs-on: ubuntu-latest
needs: lockfile

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun ci

  - name: Type check
    run: bun x tsc --noEmit
```

lint:
name: Lint and Format
timeout-minutes: 10
runs-on: ubuntu-latest
needs: lockfile

```
steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun ci

  - name: Check formatting
    run: bun run format:check

  - name: Check lint
    run: bun run lint:check
```

test:
name: Test (${{ matrix.os }})
timeout-minutes: 15
needs:
- typecheck
- lint
runs-on: ${{ matrix.os }}
continue-on-error: ${{ matrix.experimental }}

```
strategy:
  fail-fast: false
  matrix:
    include:
      - os: ubuntu-latest
        experimental: false
      - os: windows-latest
        experimental: false
      - os: macos-latest
        experimental: true

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun ci

  - name: Run tests
    run: bun test --bail
    timeout-minutes: 10
```

build:
name: Build (${{ matrix.os }})
timeout-minutes: 15
needs:
- typecheck
- lint
runs-on: ${{ matrix.os }}
continue-on-error: ${{ matrix.experimental }}

```
strategy:
  fail-fast: false
  matrix:
    include:
      - os: ubuntu-latest
        experimental: false
      - os: windows-latest
        experimental: false
      - os: macos-latest
        experimental: true

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: ${{ env.NODE_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun ci

  - name: Build
    run: bun run build

  - name: Verify build output
    run: |
      node -e "const fs = require('fs'); if (!fs.existsSync('dist/main.js')) { console.error('dist/main.js not found'); process.exit(1) }"

  - name: Verify package contents
    if: matrix.os == 'ubuntu-latest'
    run: npm pack --dry-run
```

coverage:
name: Coverage
timeout-minutes: 15
runs-on: ubuntu-latest
needs:
- test
if: always()

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ubuntu-latest-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ubuntu-latest-bun-

  - name: Install dependencies
    run: bun ci

  - name: Run coverage
    run: bun test --coverage --bail

  - name: Upload coverage report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: coverage-report
      path: coverage/
      if-no-files-found: warn
      retention-days: 14
```

audit:
name: Dependency Audit
timeout-minutes: 5
runs-on: ubuntu-latest
continue-on-error: true
needs: lockfile

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ubuntu-latest-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ubuntu-latest-bun-

  - name: Install dependencies
    run: bun ci

  - name: Check vulnerabilities
    run: bun audit
```