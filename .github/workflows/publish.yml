name: Publish

on:
push:
tags:
- 'v*'
workflow_dispatch:

concurrency:
group: ${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: false

env:
BUN_VERSION: latest
NODE_VERSION: 22

jobs:
quality:
name: Test and Build
timeout-minutes: 20
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: ${{ env.NODE_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun install --frozen-lockfile

  - name: Check formatting
    run: bun run format:check

  - name: Check lint
    run: bun run lint:check

  - name: Type check
    run: bun x tsc --noEmit

  - name: Run tests
    run: bun test --bail

  - name: Build
    run: bun run build

  - name: Verify build output
    run: |
      test -d dist
      test -s dist/main.js

  - name: Verify package contents
    run: npm pack --dry-run
```

publish:
name: Publish Packages
timeout-minutes: 20
runs-on: ubuntu-latest
needs: quality

```
permissions:
  contents: read
  packages: write
  id-token: write

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: ${{ env.NODE_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun install --frozen-lockfile

  - name: Validate tag version
    if: startsWith(github.ref, 'refs/tags/v')
    run: |
      TAG_VERSION="${GITHUB_REF_NAME#v}"
      PACKAGE_VERSION="$(node -p "require('./package.json').version")"

      echo "Tag version: $TAG_VERSION"
      echo "Package version: $PACKAGE_VERSION"

      if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
        echo "Tag version does not match package.json version"
        exit 1
      fi

  - name: Build
    run: bun run build

  - name: Verify package contents
    run: npm pack --dry-run

  - name: Check npm version availability
    id: npm_check
    run: |
      PACKAGE_NAME="$(node -p "require('./package.json').name")"
      PACKAGE_VERSION="$(node -p "require('./package.json').version")"

      if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
        echo "exists=true" >> "$GITHUB_OUTPUT"
        echo "$PACKAGE_NAME@$PACKAGE_VERSION already exists on npm"
      else
        echo "exists=false" >> "$GITHUB_OUTPUT"
      fi

  - name: Publish to npm
    if: steps.npm_check.outputs.exists == 'false'
    run: |
      cat > .npmrc <<'EOF'
      registry=https://registry.npmjs.org/
      //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      EOF

      npm publish --access public --registry https://registry.npmjs.org
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  - name: Publish to GitHub Packages
    run: |
      cat > .npmrc <<'EOF'
      @jonusnattapong:registry=https://npm.pkg.github.com
      //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
      EOF

      npm publish --registry https://npm.pkg.github.com
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```