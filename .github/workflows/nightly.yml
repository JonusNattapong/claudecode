name: Nightly

on:
schedule:
- cron: '0 0 * * *'
workflow_dispatch:

concurrency:
group: ${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true

env:
BUN_VERSION: latest

jobs:
test:
name: Test (${{ matrix.os }})
timeout-minutes: 20
runs-on: ${{ matrix.os }}

```
strategy:
  fail-fast: false
  matrix:
    os:
      - ubuntu-latest
      - windows-latest
      - macos-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ${{ runner.os }}-bun-

  - name: Install dependencies
    run: bun install --frozen-lockfile

  - name: Check formatting
    run: bun run format:check

  - name: Check lint
    run: bun run lint:check

  - name: Type check
    run: bun x tsc --noEmit

  - name: Run tests
    run: bun test --bail
    timeout-minutes: 10

  - name: Build
    run: bun run build

  - name: Verify build output
    shell: bash
    run: |
      test -d dist
      test -s dist/main.js

  - name: Upload build output
    if: failure()
    uses: actions/upload-artifact@v4
    with:
      name: nightly-build-${{ matrix.os }}
      path: dist/
      if-no-files-found: ignore
      retention-days: 7
```

coverage:
name: Coverage
timeout-minutes: 20
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
      bun-version: ${{ env.BUN_VERSION }}

  - name: Cache Bun dependencies
    uses: actions/cache@v4
    with:
      path: ~/.bun/install/cache
      key: ubuntu-latest-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
      restore-keys: |
        ubuntu-latest-bun-

  - name: Install dependencies
    run: bun install --frozen-lockfile

  - name: Run coverage
    run: bun test --coverage --bail

  - name: Upload coverage report
    uses: actions/upload-artifact@v4
    with:
      name: coverage-report
      path: coverage/
      if-no-files-found: warn
      retention-days: 30
```

audit:
name: Dependency Audit
timeout-minutes: 10
runs-on: ubuntu-latest
continue-on-error: true

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Bun
    uses: oven-sh/setup-bun@v2
    with:
