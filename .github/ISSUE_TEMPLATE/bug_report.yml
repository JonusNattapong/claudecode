name: Bug Report
description: Report a bug, crash, regression, or unexpected behavior
title: "[Bug]: "
labels:

* bug

body:

* type: markdown
  attributes:
  value: |
  Thank you for reporting a bug.

  ```
  Please provide enough detail for maintainers to reproduce the issue.

  Do not include API keys, tokens, credentials, private prompts, private repository content, or sensitive logs.
  ```

* type: checkboxes
  id: prerequisites
  attributes:
  label: Prerequisites
  description: Confirm before submitting.
  options:
  - label: I have searched existing issues and this bug has not already been reported.
  required: true
  - label: I am using the latest available version, or I have confirmed the bug still exists on the latest main branch.
  required: true
  - label: This is not a security vulnerability. Security issues should be reported privately.
  required: true
  - label: I have removed secrets, tokens, API keys, and private data from logs or screenshots.
  required: true

* type: textarea
  id: description
  attributes:
  label: Bug Description
  description: Describe the bug clearly.
  placeholder: |
  Describe what went wrong.

  ```
  Example:
  The CLI crashes when selecting an OpenAI-compatible provider after running /provider models.
  ```

  validations:
  required: true

* type: textarea
  id: reproduction
  attributes:
  label: Steps to Reproduce
  description: Provide exact steps so maintainers can reproduce the issue.
  placeholder: |
  1. Run `clew ...`
  2. Select `...`
  3. Enter `...`
  4. See error
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  description: What should have happened?
  placeholder: |
  The command should...
  validations:
  required: true

* type: textarea
  id: actual
  attributes:
  label: Actual Behavior
  description: What happened instead?
  placeholder: |
  The command failed with...

  ````
  Error output:
  ```text
  paste sanitized error output here
  ```
  ````

  validations:
  required: true

* type: dropdown
  id: area
  attributes:
  label: Affected Area
  description: Which area does this bug affect?
  options:
  - CLI Startup
  - Chat / Agent Runtime
  - AI Provider / Model Support
  - Tool / Command
  - Plugin System
  - Skill System
  - MCP Integration
  - LSP Integration
  - Authentication
  - Configuration
  - UI / Terminal
  - Build / Packaging
  - CI / Release
  - Documentation
  - Other
  validations:
  required: true

* type: dropdown
  id: provider
  attributes:
  label: AI Provider
  description: Which provider were you using when the bug happened?
  options:
  - Anthropic
  - OpenAI
  - Google Gemini
  - OpenRouter
  - Ollama
  - DeepSeek
  - Other
  - Not provider-related
  validations:
  required: false

* type: input
  id: project-version
  attributes:
  label: Project Version
  description: Run the CLI version command, check `/status`, or check package.json.
  placeholder: "2.1.x"
  validations:
  required: true

* type: input
  id: os
  attributes:
  label: Operating System
  description: Include OS name and version.
  placeholder: "Windows 11, macOS 14.0, Ubuntu 22.04"
  validations:
  required: true

* type: input
  id: terminal
  attributes:
  label: Terminal
  description: Which terminal or shell were you using?
  placeholder: "Windows Terminal, PowerShell, cmd, iTerm2, Terminal.app, GNOME Terminal, VS Code terminal"
  validations:
  required: false

* type: input
  id: node-version
  attributes:
  label: Node.js Version
  description: Run `node --version`.
  placeholder: "v22.x.x"
  validations:
  required: true

* type: input
  id: bun-version
  attributes:
  label: Bun Version
  description: Run `bun --version`.
  placeholder: "1.x.x"
  validations:
  required: true

* type: dropdown
  id: install-method
  attributes:
  label: Installation Method
  description: How did you install or run the project?
  options:
  - npm global install
  - GitHub Packages
  - Local clone
  - bun link
  - npm link
  - npx / bunx
  - Built from source
  - Other
  validations:
  required: true

* type: textarea
  id: config
  attributes:
  label: Relevant Configuration
  description: Paste sanitized config, provider settings, plugin config, MCP config, or environment details.
  placeholder: |
  Paste sanitized config here.

  ````
  Do not include:
  - API keys
  - tokens
  - private URLs
  - private repository names
  - secrets
  - credentials

  ```json
  {
    "provider": "...",
    "model": "..."
  }
  ```
  ````

  validations:
  required: false

* type: textarea
  id: logs
  attributes:
  label: Logs and Debug Output
  description: Include sanitized logs, stack traces, or `--debug` output if available.
  placeholder: |
  `text
      paste sanitized logs here
      `
  validations:
  required: false

* type: textarea
  id: screenshots
  attributes:
  label: Screenshots or Recordings
  description: Add screenshots or recordings if they help explain the problem.
  validations:
  required: false

* type: textarea
  id: regression
  attributes:
  label: Regression Information
  description: If this worked before, provide the last known working version or commit.
  placeholder: |
  Last known working version:
  First broken version:
  Suspected commit or PR:
  validations:
  required: false

* type: textarea
  id: workaround
  attributes:
  label: Workaround
  description: If you found a workaround, describe it here.
  placeholder: |
  Workaround:
  validations:
  required: false

* type: textarea
  id: additional
  attributes:
  label: Additional Context
  description: Add any other relevant context.
  placeholder: |
  Add any extra details here.
  validations:
  required: false