name: Feature Request
description: Suggest an idea, improvement, or new capability
title: "[Feature]: "
labels:

* enhancement

body:

* type: markdown
  attributes:
  value: |
  Thank you for suggesting a feature.

  ```
  Please provide enough detail for maintainers to understand the problem, evaluate the scope, and decide whether this belongs in the project.
  ```

* type: checkboxes
  id: prerequisites
  attributes:
  label: Prerequisites
  description: Confirm before submitting.
  options:
  - label: I have searched existing issues and discussions.
  required: true
  - label: This feature has not already been requested.
  required: true
  - label: This request is about this repository, not Anthropic's official services, APIs, models, accounts, or hosted infrastructure.
  required: true

* type: textarea
  id: problem
  attributes:
  label: Problem Statement
  description: Describe the problem or limitation this feature would address.
  placeholder: |
  Describe the current limitation.

  ```
  Example:
  The current provider selection flow does not let users filter models by capability, which makes it harder to choose the right model for a task.
  ```

  validations:
  required: true

* type: textarea
  id: solution
  attributes:
  label: Proposed Solution
  description: Describe the behavior, command, UI, configuration, or API you want.
  placeholder: |
  Describe the proposed feature.

  ```
  Example:
  Add a provider model filter that supports capability tags such as vision, tools, reasoning, long-context, and low-latency.
  ```

  validations:
  required: true

* type: textarea
  id: use-case
  attributes:
  label: Concrete Use Case
  description: Explain how this feature would be used in practice.
  placeholder: |
  As a user, I want to...
  So that I can...

  ```
  Include command examples, workflow examples, or expected output if useful.
  ```

  validations:
  required: true

* type: dropdown
  id: category
  attributes:
  label: Feature Category
  description: Which area does this feature affect?
  options:
  - AI Provider / Model Support
  - Tool / Command
  - Plugin System
  - Skill System
  - MCP Integration
  - LSP Integration
  - UI / Terminal
  - Configuration
  - Authentication
  - Performance
  - Security / Permissions
  - Documentation
  - Build / Packaging
  - CI / Release
  - Other
  validations:
  required: true

* type: dropdown
  id: priority
  attributes:
  label: Priority
  description: How important is this feature to your workflow?
  options:
  - Low
  - Medium
  - High
  - Critical
  validations:
  required: true

* type: textarea
  id: alternatives
  attributes:
  label: Alternatives Considered
  description: Describe any alternative designs, workarounds, or existing tools you considered.
  placeholder: |
  Alternative 1:
  Alternative 2:
  Current workaround:

* type: textarea
  id: compatibility
  attributes:
  label: Compatibility Notes
  description: Describe any compatibility concerns.
  placeholder: |
  Does this affect existing commands, config files, plugins, MCP servers, providers, or stored data?

  ```
  If yes, explain the expected migration path.
  ```

* type: checkboxes
  id: breaking-change
  attributes:
  label: Breaking Change
  description: Would this feature require breaking existing behavior?
  options:
  - label: This feature may require a breaking change.
  required: false

* type: textarea
  id: implementation
  attributes:
  label: Possible Implementation
  description: Optional. Describe files, modules, commands, or architecture changes that may be involved.
  placeholder: |
  Possible files/modules:
  - src/commands/...
  - src/services/...
  - src/tools/...

  ```
  Notes:
  ```

* type: textarea
  id: additional
  attributes:
  label: Additional Context
  description: Add mockups, examples, logs, command output, links, or related context.
  placeholder: |
  Add any extra information here.

* type: checkboxes
  id: contribution
  attributes:
  label: Contribution
  description: Are you willing to help implement this?
  options:
  - label: I am willing to submit a pull request for this feature.
  required: false
  - label: I am willing to test this feature before release.
  required: false
  - label: I am willing to help write documentation for this feature.
  required: false
